# ============================================================
# Docker Compose 部署配置
# 一键启动 AI 服务 + 自动导入 FAQ 数据
# ============================================================
#
# 使用步骤：
#   1. 复制 .env.example 为 .env，填入你的 API Key
#   2. docker-compose up -d
#   3. 访问 http://localhost:8082/docs 查看 API 文档
#
# ============================================================

services:
  ai-service:
    build: .
    container_name: ai-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      # 持久化 ChromaDB 数据，防止容器重启后丢失
      - chroma_data:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/chat/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  chroma_data:
